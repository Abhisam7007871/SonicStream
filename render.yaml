# Render Blueprint — Single Web Service for SonicStream
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: sonicstream
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      # Set these in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: JAMENDO_CLIENT_ID
        sync: false
    healthCheckPath: /health
    autoDeploy: true
